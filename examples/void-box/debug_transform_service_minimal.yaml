api_version: v1
kind: agent
name: debug_transform_service_minimal

sandbox:
  mode: auto
  memory_mb: 3072
  vcpus: 2
  network: true
  image: "python:3.12-slim"
  mounts:
    - host: "../../void-control/examples/void-box"
      guest: "/workspace/transform-example"
      mode: "ro"
  env:
    TRANSFORM_STAGE: Transform-02
    TRANSFORM_STRATEGY: baseline
    TRANSFORM_PARALLELISM: "2"
    TRANSFORM_BATCH_SIZE: "16"
    TRANSFORM_CACHE_MODE: disabled
    TRANSFORM_VALIDATION_MODE: balanced
    TRANSFORM_PREFETCH: disabled
    TRANSFORM_CPU_BUDGET: "70"
    TRANSFORM_ROLE: debug-minimal

llm:
  provider: claude

agent:
  mode: service
  skills:
    - "agent:claude-code"
  messaging:
    enabled: true
  output_file: /workspace/output.json
  prompt: |
    Do these steps exactly:

    1. Verify that `python3` exists.
    2. Run `python3 /workspace/transform-example/transform_benchmark.py`.
    3. Read `/workspace/output.json` and confirm it contains the benchmark metrics.
    4. Sleep for 60 seconds.
    5. Do not delete or rewrite `/workspace/output.json`.
