api_version: v1
kind: agent
name: transform_supervision_worker

sandbox:
  mode: auto
  memory_mb: 3072
  vcpus: 2
  network: true
  image: "python:3.12-slim"
  mounts:
    - host: "../../void-control/examples/runtime-assets"
      guest: "/workspace/runtime-assets"
      mode: "ro"
  env:
    TRANSFORM_STAGE: Transform-02
    TRANSFORM_STRATEGY: baseline
    TRANSFORM_PARALLELISM: "2"
    TRANSFORM_BATCH_SIZE: "16"
    TRANSFORM_CACHE_MODE: disabled
    TRANSFORM_VALIDATION_MODE: balanced
    TRANSFORM_PREFETCH: disabled
    TRANSFORM_CPU_BUDGET: "70"
    SUPERVISION_MAX_LATENCY_P99_MS: "10.0"
    SUPERVISION_MAX_ERROR_RATE: "0.34"
    SUPERVISION_MAX_CPU_PCT: "100.0"

llm:
  provider: claude

agent:
  mode: service
  skills:
    - "agent:claude-code"
  output_file: /workspace/output.json
  prompt: |
    You are one worker in a supervision execution for the production
    Transform-02 stage.

    Your worker role is provided in `TRANSFORM_ROLE`. Treat that role as your
    primary specialization, but always use measured output from the benchmark as
    the source of truth.

    Read the worker configuration from these environment variables only:
    - TRANSFORM_STRATEGY
    - TRANSFORM_PARALLELISM
    - TRANSFORM_BATCH_SIZE
    - TRANSFORM_CACHE_MODE
    - TRANSFORM_VALIDATION_MODE
    - TRANSFORM_PREFETCH
    - TRANSFORM_CPU_BUDGET
    - TRANSFORM_ROLE
    - SUPERVISION_MAX_LATENCY_P99_MS
    - SUPERVISION_MAX_ERROR_RATE
    - SUPERVISION_MAX_CPU_PCT

    Do these steps exactly:

    1. Verify that `python3` exists.
    2. Run `python3 /workspace/runtime-assets/transform_supervision_worker.py`.
    3. Read `/workspace/output.json`.
    4. Do not overwrite `/workspace/output.json` after the wrapper has written
       the final result.

    The wrapper runs the measured benchmark and then adds the supervision
    approval metric that `void-control` expects in v1.
