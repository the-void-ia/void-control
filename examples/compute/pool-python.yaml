api_version: v1
kind: sandbox_pool
metadata:
  name: benchmark-python-pool
sandbox_spec:
  runtime:
    image: python:3.12-slim
    cpus: 2
    memory_mb: 2048
  snapshot:
    restore_from: snapshot-transform-v1
  lifecycle:
    prewarm: true
    idle_timeout_secs: 900
  identity:
    reusable: true
    pool: benchmark-python
capacity:
  warm: 5
  max: 20
