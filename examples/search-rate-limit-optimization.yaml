mode: search
goal: >
  Starting from a promising Transform-02 rate-limit policy, search around the
  incumbent by testing tighter window control, jitter, and adaptive window
  variants until the best latency and error profile stabilizes.
workflow:
  template: examples/runtime-templates/rate_limit_optimizer_agent.yaml
policy:
  budget:
    max_iterations: 4
    max_child_runs: 12
    max_wall_clock_secs: 1800
  concurrency:
    max_concurrent_candidates: 3
  convergence:
    strategy: threshold
    min_score: 0.84
    max_iterations_without_improvement: 2
  max_candidate_failures_per_iteration: 3
  missing_output_policy: mark_failed
  iteration_failure_policy: continue
evaluation:
  scoring_type: weighted_metrics
  weights:
    latency_p99_ms: -0.45
    error_rate: -0.40
    cpu_pct: -0.15
  pass_threshold: 0.84
  ranking: highest_score
  tie_breaking: error_rate
variation:
  source: explicit
  candidates_per_iteration: 3
  explicit:
    - overrides:
        sandbox.env.RATE_LIMIT_MODE: v1
        sandbox.env.JITTER_ENABLED: "false"
        sandbox.env.ADAPTIVE_WINDOW: "false"
    - overrides:
        sandbox.env.RATE_LIMIT_MODE: v2
        sandbox.env.JITTER_ENABLED: "false"
        sandbox.env.ADAPTIVE_WINDOW: "false"
    - overrides:
        sandbox.env.RATE_LIMIT_MODE: v2
        sandbox.env.JITTER_ENABLED: "true"
        sandbox.env.ADAPTIVE_WINDOW: "false"
    - overrides:
        sandbox.env.RATE_LIMIT_MODE: v2
        sandbox.env.JITTER_ENABLED: "false"
        sandbox.env.ADAPTIVE_WINDOW: "true"
    - overrides:
        sandbox.env.RATE_LIMIT_MODE: v3
        sandbox.env.JITTER_ENABLED: "true"
        sandbox.env.ADAPTIVE_WINDOW: "true"
swarm: false
